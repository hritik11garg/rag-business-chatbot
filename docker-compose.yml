# Two ways to run:
#
#   docker compose up -d
#       infrastructure only (postgres + redis) — for local development
#       with uvicorn/celery running on the host, as in SETUP.md.
#
#   docker compose --profile app up --build
#       one-command full stack: postgres, redis, migrations, API on
#       :8000, Celery worker. Needs a filled-in .env (SECRET_KEY + the
#       LLM key); DATABASE_URL/CELERY urls are overridden below to the
#       in-network hostnames.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    # Bound to loopback: the host needs it for local uvicorn/alembic, but
    # it must never be reachable from another machine. "5433:5432" would
    # publish on 0.0.0.0 and expose the database to the whole network.
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpass}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
    volumes:
      - pgdata16:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DB:-ragdb}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: rag-redis
    # requirepass: an unauthenticated Redis is a full-compromise primitive
    # (read/modify queued tasks, and CONFIG SET dir/dbfilename can write
    # arbitrary files). Loopback binding is the second layer.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-ragredispass}"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ragredispass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    profiles: [app]
    build: .
    container_name: rag-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-raguser}:${POSTGRES_PASSWORD:-ragpass}@postgres:5432/${POSTGRES_DB:-ragdb}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-ragredispass}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-ragredispass}@redis:6379/0
      # xet transfer backend hangs in some container networks; plain
      # HTTPS download of MiniLM (~90MB) is reliable
      HF_HUB_DISABLE_XET: "1"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --no-access-log"
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
      - model_cache:/home/appuser/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    profiles: [app]
    build: .
    container_name: rag-worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-raguser}:${POSTGRES_PASSWORD:-ragpass}@postgres:5432/${POSTGRES_DB:-ragdb}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-ragredispass}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-ragredispass}@redis:6379/0
      # xet transfer backend hangs in some container networks; plain
      # HTTPS download of MiniLM (~90MB) is reliable
      HF_HUB_DISABLE_XET: "1"
    command: celery -A app.core.celery_app:celery worker -Q rag-queue --loglevel=info
    volumes:
      - uploads:/app/uploads
      - model_cache:/home/appuser/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata16:
  uploads:
  model_cache:
