services:
  postgres:
    image: ankane/pgvector
    container_name: rag-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: ragdb
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: rag-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
